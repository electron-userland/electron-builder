name: 'pnpm installation'
description: 'Enable via corepack and install dependencies'

runs:
  using: 'composite'
  steps:
    - name: Enable Corepack for pnpm
      run: |
        corepack enable
        # Pre-activate the exact pnpm version from packageManager so that
        # setup-node can run 'pnpm store path' without triggering a mid-step download.
        # Retry on transient registry timeouts.
        for i in 1 2 3; do
          COREPACK_ENABLE_DOWNLOAD_PROMPT=0 corepack prepare --activate && break
          [ $i -lt 3 ] && echo "corepack prepare failed (attempt $i/3), retrying in 15s…" && sleep 15
        done
      shell: bash

    - name: Setup node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '22'
        cache: 'pnpm'

    - name: Update npm to support OIDC token authentication for publishing
      run: npm install -g npm@11.6.2
      shell: bash

    - name: Verify updated npm version
      run: npm -v
      shell: bash

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      shell: bash

