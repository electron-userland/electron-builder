name: 'Setup Tests'
description: 'Set up pnpm, node w/ pnpm cache, install deps, compile, and restore electron cache'
inputs:
  cache-key:
    description: 'The key to the electron cache'
    required: true
  cache-path:
    description: 'The path to the electron cache'
    required: true
  reset-vitest-smart-cache:
    description: "Reset Vitest smart cache (will cause all tests to run without caching for this run, then cache will be repopulated for future runs)"
    required: false
    type: boolean
    default: false

runs:
  using: 'composite'
  steps:
    - name: Setup PNPM and install dependencies
      uses: ./.github/actions/pnpm

    - name: Compile
      run: pnpm compile
      shell: bash

    - name: Cache Electron
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: ${{ inputs.cache-path }}
        key: ${{ inputs.cache-key }}

    - name: Cache electron-builder binaries
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: |
          ~/.cache/electron-builder
          ~/Library/Caches/electron-builder
        key: electron-builder-binaries-${{ runner.os }}-${{ hashFiles('packages/app-builder-lib/src/toolsets/linux.ts', 'packages/app-builder-lib/src/toolsets/win.ts', 'packages/app-builder-lib/src/toolsets/mac.ts') }}
        restore-keys: |
          electron-builder-binaries-${{ runner.os }}-

    - name: Compute Vitest smart cache ref
      run: |
        PR_NUM="${{ github.event.pull_request.number }}"
        if [ -n "$PR_NUM" ]; then
          echo "VITEST_CACHE_REF=PR-${PR_NUM}" >> "$GITHUB_ENV"
        else
          echo "VITEST_CACHE_REF=${{ github.ref_name }}" >> "$GITHUB_ENV"
        fi
      shell: bash

    - name: Restore Vitest Smart Cache
      run: |
        DEST="${{ github.workspace }}/test/vitest-scripts/_vitest-smart-cache.json"
        for CACHE_NAME in "vitest-smart-cache-${{ env.VITEST_CACHE_REF }}" "vitest-smart-cache-master"; do
          RUN_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts?name=${CACHE_NAME}&per_page=30" \
            --jq '[.artifacts[] | select(.expired == false)] | sort_by(.created_at) | last | .workflow_run.id // empty' 2>/dev/null || true)
          if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
            echo "Downloading vitest smart cache ($CACHE_NAME) from run $RUN_ID..."
            TEMP_DIR="${{ github.workspace }}/temp/vitest-cache-download"
            mkdir -p "$TEMP_DIR"
            if gh run download "$RUN_ID" \
              --repo "${{ github.repository }}" \
              --name "$CACHE_NAME" \
              --dir "$TEMP_DIR" 2>/dev/null; then
              DOWNLOADED=$(find "$TEMP_DIR" -name "_vitest-smart-cache.json" | head -1)
              if [ -n "$DOWNLOADED" ]; then
                cp "$DOWNLOADED" "$DEST"
                echo "✓ Restored vitest smart cache from artifact ($CACHE_NAME)"
                rm -rf "$TEMP_DIR"
                break
              fi
            fi
            rm -rf "$TEMP_DIR"
          fi
        done
        if [ ! -f "$DEST" ]; then
          echo "ℹ No smart cache artifact found — using repo-committed baseline"
        fi
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Set up Vitest smart cache reset flag
      run: echo "RESET_VITEST_SHARD_CACHE=${{ inputs.reset-vitest-smart-cache }}" >> $GITHUB_ENV
      shell: bash

## Usage
