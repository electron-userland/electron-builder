name: 'Setup Tests'
description: 'Set up pnpm, node w/ pnpm cache, install deps, compile, and restore electron cache'
inputs:
  cache-key:
    description: 'The key to the electron cache'
    required: true
  cache-path:
    description: 'The path to the electron cache'
    required: true
  reset-vitest-smart-cache:
    description: "Reset Vitest smart cache (planning shows all tests as 'unknown' and shards split evenly; cache is repopulated from this run for future runs)"
    required: false
    default: "false"
  collect-coverage:
    description: "Collect v8 code coverage during the test run (opt-in; merged into a downloadable report by the merge job)"
    required: false
    default: "false"

runs:
  using: 'composite'
  steps:
    - name: Setup PNPM and install dependencies
      uses: ./.github/actions/pnpm

    - name: Compile
      run: pnpm compile
      shell: bash

    - name: Cache Electron
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: ${{ inputs.cache-path }}
        key: ${{ inputs.cache-key }}

    - name: Cache electron-builder binaries
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: |
          ~/.cache/electron-builder
          ~/Library/Caches/electron-builder
        key: electron-builder-binaries-${{ runner.os }}-${{ hashFiles('packages/app-builder-lib/src/toolsets/linux.ts', 'packages/app-builder-lib/src/toolsets/win.ts', 'packages/app-builder-lib/src/toolsets/mac.ts') }}
        restore-keys: |
          electron-builder-binaries-${{ runner.os }}-

    - name: Compute Vitest smart cache ref
      id: compute-cache-ref
      run: |
        if [ -n "${PR_NUM}" ]; then
          echo "value=PR-${PR_NUM}" >> "$GITHUB_OUTPUT"
        else
          # Artifact names cannot contain "/", so sanitize slashes in branch
          # names like "release/v26" -> "release-v26" (keep in sync with detectRef in fetch-smart-cache.ts).
          echo "value=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_OUTPUT"
        fi
      shell: bash
      env:
        PR_NUM: ${{ github.event.pull_request.number }}

    # Skip the restore entirely on a reset run: there is no point downloading the previous cache
    # only to ignore it. Combined with the RESET_VITEST_SHARD_CACHE guard in loadCache(), this makes
    # the shard plan show every file as "unknown" and split shards evenly. (Cache file is gitignored,
    # so a fresh checkout has none — nothing is loaded.)
    - name: Restore Vitest Smart Cache
      if: inputs.reset-vitest-smart-cache != 'true'
      run: pnpm ci:test:fetch-cache
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        VITEST_CACHE_REF: ${{ steps.compute-cache-ref.outputs.value }}

    - name: Set up Vitest smart cache reset flag
      run: |
        if [ "${INPUTS_RESET_VITEST_SMART_CACHE}" = "true" ]; then
          echo "RESET_VITEST_SHARD_CACHE=true" >> "$GITHUB_ENV"
        else
          echo "RESET_VITEST_SHARD_CACHE=false" >> "$GITHUB_ENV"
        fi
      shell: bash
      env:
        INPUTS_RESET_VITEST_SMART_CACHE: ${{ inputs.reset-vitest-smart-cache }}

    - name: Set up Vitest coverage flag
      run: echo "VITEST_COVERAGE=${{ inputs.collect-coverage }}" >> $GITHUB_ENV
      shell: bash

## Usage
