name: 'Upload test report'
description: "Upload this job's per-shard Vitest JSON + blob reports for the merge job to aggregate into the run summary and combined report"
inputs:
  name:
    description: "Unique artifact label for this shard/job (e.g. linux-3, windows-0, updater, snap-core24, e2e-apt)"
    required: true

runs:
  using: 'composite'
  steps:
    # JSON report → end-of-run summary + failed-tests list (test-summary.ts).
    # Blob report → combined @vitest/ui HTML + merged coverage (merge-reports.ts).
    # Both are written under the workspace by run-vitest.ts (docker mounts `-v $(pwd):/project`, so
    # reports emitted inside the container surface here too). if-no-files-found: ignore keeps jobs that
    # produced nothing (e.g. an early failure before any test ran) from failing on the upload.
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: vitest-report-${{ inputs.name }}
        path: |
          test-results/
          .vitest-reports/
        retention-days: 7
        if-no-files-found: ignore
