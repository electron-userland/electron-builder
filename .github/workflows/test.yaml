name: Test

on:
  push:
    branches:
      - master
      - release/v*
  pull_request:
  workflow_call:
    inputs:
      rebuild-docker-images-call:
        description: "Force rebuild of Docker images?"
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      rebuild-docker-images:
        description: "Force rebuild of Docker images?"
        required: false
        type: boolean
        default: false
      reset-vitest-smart-cache:
        description: "Reset Vitest smart cache (will cause all tests to run without caching for this run, then cache will be repopulated for future runs)"
        required: false
        type: boolean
        default: false

# concurrency:
# group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
# cancel-in-progress: true

permissions:
  contents: read

env:
  TEST_IMAGE_NODE_MAJOR_VERSION: 22

jobs:
  check-if-docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      force-docker-build: ${{ steps.changes.outputs.docker == 'true' || steps.changes.outputs.workflow == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with: { fetch-depth: 0 }

      - name: Determine if Dockerfiles changed
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: changes
        with:
          filters: |
            docker:
              - 'docker/*/Dockerfile'
              - 'docker/build.sh'
            workflow:
              - '.github/workflows/docker-build.yml'

  run-docker-build:
    needs: check-if-docker-build
    if: |
      always() &&
      (needs.check-if-docker-build.outputs.force-docker-build == 'true' ||
      inputs.rebuild-docker-images == 'true' || inputs.rebuild-docker-images == true ||
      inputs.rebuild-docker-images-call == 'true' || inputs.rebuild-docker-images-call == true)
    uses: ./.github/workflows/docker-build.yml

  # -------------------------
  # Shard Planning (unified job outputting map for all platforms)
  # -------------------------

  shard-plan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      linux: ${{ steps.plan.outputs.linux }}
      windows: ${{ steps.plan.outputs.windows }}
      macos: ${{ steps.plan.outputs.macos }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Tests
        uses: ./.github/actions/pretest
        with:
          cache-key: v-39.8.5-linux-electron
          cache-path: ~/.cache/electron
          reset-vitest-smart-cache: ${{ inputs.reset-vitest-smart-cache }}

      - name: Output shard plan
        run: pnpm ci:test:count

      - id: plan
        run: |
          # Get shard counts for all platforms as JSON
          SHARD_JSON=$(pnpm --silent ci:test:count | tail -n1)

          # Extract individual platform arrays
          LINUX_SHARDS=$(echo "$SHARD_JSON" | jq -c '.linux')
          WINDOWS_SHARDS=$(echo "$SHARD_JSON" | jq -c '.win32')
          MACOS_SHARDS=$(echo "$SHARD_JSON" | jq -c '.darwin')

          # Set outputs
          echo "linux=$LINUX_SHARDS" >> $GITHUB_OUTPUT
          echo "windows=$WINDOWS_SHARDS" >> $GITHUB_OUTPUT
          echo "macos=$MACOS_SHARDS" >> $GITHUB_OUTPUT

          # Debug output
          echo "Planned shards:"
          echo "  Linux: $LINUX_SHARDS"
          echo "  Windows: $WINDOWS_SHARDS"
          echo "  macOS: $MACOS_SHARDS"

  # -------------------------
  # Unified Test Jobs (one per OS, sharding within)
  # -------------------------

  test-linux:
    name: Test Linux (Shard ${{ matrix.shard }})
    needs: [check-if-docker-build, run-docker-build, shard-plan]
    if: |
      always() &&
      needs.check-if-docker-build.result == 'success' &&
      (needs.run-docker-build.result == 'success' || needs.run-docker-build.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.shard-plan.outputs.linux) }}
        include:
          - platform: linux
            runner: ubuntu-latest
            cache-path: ~/.cache/electron
            cache-key: v-39.8.5-linux-electron
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Cleanup runner
        uses: ./.github/actions/cleanup-runner

      - name: Setup Tests
        uses: ./.github/actions/pretest
        with:
          cache-path: ${{ matrix.cache-path }}
          cache-key: ${{ matrix.cache-key }}
          reset-vitest-smart-cache: ${{ inputs.reset-vitest-smart-cache }}

      - name: Download test-runner if exists
        if: needs.run-docker-build.result == 'success'
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: electron-builder-all-${{ env.TEST_IMAGE_NODE_MAJOR_VERSION }}
          path: ${{ runner.temp }}

      - name: Load test runner image if needed
        if: needs.run-docker-build.result == 'success'
        run: |
          docker image load --input ${{ runner.temp }}/electron-builder-all-${{ env.TEST_IMAGE_NODE_MAJOR_VERSION }}.tar
          docker image ls -a

      - name: Write Docker secrets env file
        run: |
          printf 'CSC_KEY_PASSWORD=%s\n' "$CSC_KEY_PASSWORD_SECRET" > "${{ runner.temp }}/docker-secrets.env"
          chmod 600 "${{ runner.temp }}/docker-secrets.env"
        env:
          CSC_KEY_PASSWORD_SECRET: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Provision squirrel.windows toolset
        run: |
          # squirrel.windows@1.1.0 bundles the Chocolatey shim for nuget.exe which fails when
          # relocated. Replace the shim with a standalone portable nuget.exe (CI-only download).
          # rcedit.exe is supplied at runtime from the win-codesign toolset by SquirrelWindowsTarget.
          TOOLSET_DIR="${{ runner.temp }}/squirrel-toolset"
          VENDOR_DIR="$TOOLSET_DIR/electron-winstaller/vendor"
          mkdir -p "$TOOLSET_DIR"
          curl -fsSL -o "${{ runner.temp }}/squirrel.zip" \
            "https://github.com/electron-userland/electron-builder-binaries/releases/download/squirrel.windows%401.1.0/squirrel.windows-2.0.1-patched.zip"
          unzip -q "${{ runner.temp }}/squirrel.zip" -d "$TOOLSET_DIR"
          curl -fsSL -o "$VENDOR_DIR/nuget.exe" \
            "https://dist.nuget.org/win-x86-commandline/v6.14.0/nuget.exe"
          echo "SQUIRREL_TOOLSET_HOST_DIR=$TOOLSET_DIR" >> "$GITHUB_ENV"

      - name: Run shard in docker
        run: |
          echo $TEST_RUNNER_IMAGE_TAG
          export ADDITIONAL_DOCKER_ARGS="--env-file ${{ runner.temp }}/docker-secrets.env \
            -e VITEST_SHARD_INDEX=${{ matrix.shard }} \
            -e VITEST_SMART_CACHE_FILE=./test/vitest-scripts/_vitest-smart-cache.json \
            -e RESET_VITEST_SHARD_CACHE=${{ inputs.reset-vitest-smart-cache }} \
            -v ${SQUIRREL_TOOLSET_HOST_DIR}:/squirrel-toolset:ro \
            -e ELECTRON_BUILDER_SQUIRREL_TOOLSET_DIR=/squirrel-toolset"
          pnpm test-linux
        env:
          TEST_RUNNER_IMAGE_TAG: electronuserland/builder:${{ env.TEST_IMAGE_NODE_MAJOR_VERSION }}-wine-mono

      - name: Upload smart cache artifact
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.2
        if: always()
        with:
          name: vitest-smart-cache-${{ matrix.platform }}-${{ matrix.shard }}
          path: ${{ github.workspace }}/test/vitest-scripts/_vitest-smart-cache.json
          retention-days: 1
          if-no-files-found: error

  test-windows:
    name: Test Windows (Shard ${{ matrix.shard }})
    needs: shard-plan
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.shard-plan.outputs.windows) }}
        include:
          - platform: windows
            runner: windows-latest
            cache-path: ~\AppData\Local\electron\Cache
            cache-key: v-39.8.5-windows-electron
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Tests
        uses: ./.github/actions/pretest
        with:
          cache-key: ${{ matrix.cache-key }}
          cache-path: ${{ matrix.cache-path }}
          reset-vitest-smart-cache: ${{ inputs.reset-vitest-smart-cache }}

      - name: Pre-initialize NuGet IsolatedStorage
        shell: pwsh
        run: |
          # NuGet 2.x (bundled in the Squirrel.Windows vendor) uses IsolatedStorageFile.GetUserStoreForAssembly()
          # for user settings. On fresh Windows CI runners this directory may not exist, causing the first
          # NuGet invocation to fail with IsolatedStorageException (0x80131468). Pre-creating it lets
          # the CLR create its hashed subdirectory without error.
          New-Item -ItemType Directory -Force -Path "$env:LOCALAPPDATA\IsolatedStorage" | Out-Null

      - name: Provision squirrel.windows toolset
        shell: pwsh
        run: |
          # squirrel.windows@1.1.0 bundles the Chocolatey shim for nuget.exe. The shim resolves the
          # real binary relative to its Chocolatey install path and fails when copied to a temp dir.
          # rcedit.exe is supplied at runtime from the win-codesign toolset by SquirrelWindowsTarget.
          $toolsetDir = "$env:RUNNER_TEMP\squirrel-toolset"
          $zipPath    = "$env:RUNNER_TEMP\squirrel.zip"
          Invoke-WebRequest `
            -Uri "https://github.com/electron-userland/electron-builder-binaries/releases/download/squirrel.windows%401.1.0/squirrel.windows-2.0.1-patched.zip" `
            -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $toolsetDir -Force
          $realNuget = Join-Path $env:ChocolateyInstall "lib\NuGet.CommandLine\tools\nuget.exe"
          Copy-Item $realNuget "$toolsetDir\electron-winstaller\vendor\nuget.exe" -Force
          "ELECTRON_BUILDER_SQUIRREL_TOOLSET_DIR=$toolsetDir" >> $env:GITHUB_ENV

      - name: Run shard
        run: pnpm ci:test
        env:
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          VITEST_SHARD_INDEX: ${{ matrix.shard }}
          VITEST_SMART_CACHE_FILE: ${{ github.workspace }}\test\vitest-scripts\_vitest-smart-cache.json

      - name: Upload smart cache artifact
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.2
        if: always()
        with:
          name: vitest-smart-cache-${{ matrix.platform }}-${{ matrix.shard }}
          path: ${{ github.workspace }}\test\vitest-scripts\_vitest-smart-cache.json
          retention-days: 1
          if-no-files-found: error

  test-macos:
    name: Test macOS (Shard ${{ matrix.shard }})
    needs: shard-plan
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.shard-plan.outputs.macos) }}
        include:
          - platform: macos
            runner: macos-26
            cache-path: ~/Library/Caches/electron
            cache-key: v-39.8.5-macos-electron
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Tests
        uses: ./.github/actions/pretest
        with:
          cache-path: ${{ matrix.cache-path }}
          cache-key: ${{ matrix.cache-key }}
          reset-vitest-smart-cache: ${{ inputs.reset-vitest-smart-cache }}

      - name: Install toolset via brew
        run: |
          brew install rpm
          brew install snapcraft

      - name: Run shard
        run: pnpm ci:test
        env:
          VITEST_SHARD_INDEX: ${{ matrix.shard }}
          VITEST_SMART_CACHE_FILE: ${{ github.workspace }}/test/vitest-scripts/_vitest-smart-cache.json
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}

      - name: Upload smart cache artifact
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.2
        if: always()
        with:
          name: vitest-smart-cache-${{ matrix.platform }}-${{ matrix.shard }}
          path: ${{ github.workspace }}/test/vitest-scripts/_vitest-smart-cache.json
          retention-days: 1
          if-no-files-found: error

  # -------------------------
  # Special test jobs
  # -------------------------

  # Need to separate from other tests because logic is specific to when TOKEN env vars are set
  test-updater:
    name: Test Updater
    needs: [check-if-docker-build, run-docker-build]
    if: |
      always() &&
      needs.check-if-docker-build.result == 'success' &&
      (needs.run-docker-build.result == 'success' || needs.run-docker-build.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cleanup runner
        uses: ./.github/actions/cleanup-runner

      - name: Setup Tests
        uses: ./.github/actions/pretest
        with:
          cache-path: ~/.cache/electron
          cache-key: v-39.8.5-update-electron
          reset-vitest-smart-cache: ${{ inputs.reset-vitest-smart-cache }}

      - name: Verify Docs Generation
        run: pnpm generate:all

      - name: Verify Site Generation
        run: pnpm docs:all

      - name: Download test-runner if exists
        if: needs.run-docker-build.result == 'success'
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: electron-builder-all-${{ env.TEST_IMAGE_NODE_MAJOR_VERSION }}
          path: ${{ runner.temp }}

      - name: Load test runner image if needed
        if: needs.run-docker-build.result == 'success'
        run: |
          docker image load --input ${{ runner.temp }}/electron-builder-all-${{ env.TEST_IMAGE_NODE_MAJOR_VERSION }}.tar
          docker image ls -a

      - name: Write Docker secrets env file
        run: |
          printf 'KEYGEN_TOKEN=%s\nBITBUCKET_TOKEN=%s\nGH_TOKEN=%s\nGITLAB_TOKEN=%s\n' \
            "$KEYGEN_TOKEN_SECRET" "$BITBUCKET_TOKEN_SECRET" "$GH_TOKEN_SECRET" "$GITLAB_TOKEN_SECRET" \
            > "${{ runner.temp }}/docker-secrets.env"
          chmod 600 "${{ runner.temp }}/docker-secrets.env"
        env:
          KEYGEN_TOKEN_SECRET: ${{ secrets.KEYGEN_TOKEN }}
          BITBUCKET_TOKEN_SECRET: ${{ secrets.BITBUCKET_TOKEN }}
          GH_TOKEN_SECRET: ${{ secrets.GH_TOKEN }}
          GITLAB_TOKEN_SECRET: ${{ secrets.GITLAB_TOKEN }}

      - name: Test
        run: |
          echo $TEST_RUNNER_IMAGE_TAG
          pnpm test-linux
        env:
          TEST_FILES: nsisUpdaterTest,PublishManagerTest,differentialUpdateTest,GitlabPublisherTest,GitlabPublisher.integration.test
          TEST_RUNNER_IMAGE_TAG: electronuserland/builder:${{ env.TEST_IMAGE_NODE_MAJOR_VERSION }}-wine-mono
          ADDITIONAL_DOCKER_ARGS: "--env-file ${{ runner.temp }}/docker-secrets.env -e VITEST_SMART_CACHE_FILE=./test/vitest-scripts/_vitest-smart-cache.json -e RESET_VITEST_SHARD_CACHE=${{ inputs.reset-vitest-smart-cache }}"

      - name: Upload smart cache artifact
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.2
        if: always()
        with:
          name: vitest-smart-cache-updater
          path: ${{ github.workspace }}/test/vitest-scripts/_vitest-smart-cache.json
          retention-days: 1
          if-no-files-found: error

  test-snap:
    name: Test Snap (${{ matrix.core }})
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        core: [core18, core20, core22, core24]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Tests
        uses: ./.github/actions/pretest
        with:
          cache-path: ~/.cache/electron
          cache-key: v-39.8.5-native-electron
          reset-vitest-smart-cache: ${{ inputs.reset-vitest-smart-cache }}

      - name: Test snap ${{ matrix.core }} (Docker)
        run: SNAP_CORE=${{ matrix.core }} ./test/src/linux/test-snap.sh
        env:
          VITEST_SMART_CACHE_FILE: ${{ github.workspace }}/test/vitest-scripts/_vitest-smart-cache.json
          RESET_VITEST_SHARD_CACHE: ${{ inputs.reset-vitest-smart-cache }}

      # Native install+launch test — core24 only; requires snapcraft + unsquashfs on the runner.
      - name: Disable background apt services (prevent apt lock contention)
        if: matrix.core == 'core24'
        run: |
          sudo systemctl stop unattended-upgrades apt-daily.service apt-daily-upgrade.service || true
          sudo systemctl disable apt-daily.timer apt-daily-upgrade.timer || true
          sudo systemctl kill --kill-who=all apt-daily.service apt-daily-upgrade.service || true
          while sudo fuser /var/lib/apt/lists/lock /var/lib/dpkg/lock /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do
            echo "Waiting for apt lock to be released…"
            sleep 2
          done

      - name: Install snapcraft natively
        if: matrix.core == 'core24'
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools xvfb
          sudo snap install snapcraft --classic

      - name: Test snap core24 native (install + launch)
        if: matrix.core == 'core24'
        run: pnpm ci:test
        env:
          TEST_FILES: snapHeavyTest
          SNAP_TEST_CORES: core24
          SNAPCRAFT_BUILD_ENVIRONMENT: host
          RUN_SNAP_TESTS: "true"
          VITEST_SMART_CACHE_FILE: ${{ github.workspace }}/test/vitest-scripts/_vitest-smart-cache.json
          RESET_VITEST_SHARD_CACHE: ${{ inputs.reset-vitest-smart-cache }}

      - name: Upload smart cache artifact
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.2
        if: always()
        with:
          name: vitest-smart-cache-snap-${{ matrix.core }}
          path: ${{ github.workspace }}/test/vitest-scripts/_vitest-smart-cache.json
          retention-days: 1
          if-no-files-found: error

  test-e2e:
    name: Test e2e Auto Updater Linux
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        test_config:
          - stem: archlinux
            env:
              PACKAGE_MANAGER_TO_TEST: pacman
          - stem: rpm
            env:
              PACKAGE_MANAGER_TO_TEST: dnf
          - stem: rpm
            env:
              PACKAGE_MANAGER_TO_TEST: zypper
          - stem: rpm
            env:
              PACKAGE_MANAGER_TO_TEST: yum
          - stem: rpm
            env:
              PACKAGE_MANAGER_TO_TEST: rpm
          - stem: debian
            env:
              PACKAGE_MANAGER_TO_TEST: apt
          - stem: debian
            env:
              PACKAGE_MANAGER_TO_TEST: dpkg
          - stem: appimage
            env:
              RUN_APP_IMAGE_TEST: true
    steps:
      - name: Checkout code repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Tests
        uses: ./.github/actions/pretest
        with:
          cache-path: ~/.cache/electron
          cache-key: v-39.8.5-linux-e2e-electron
          reset-vitest-smart-cache: ${{ inputs.reset-vitest-smart-cache }}

      - name: docker build
        run: ./test/src/updater/test-specific-platforms.sh ${{ matrix.test_config.stem }} build

      - name: e2e Linux Updater tests (install, auto-update, uninstall)
        run: ./test/src/updater/test-specific-platforms.sh ${{ matrix.test_config.stem }} run
        env:
          ADDITIONAL_DOCKER_ARGS: >-
            -e PACKAGE_MANAGER_TO_TEST=${{ matrix.test_config.env.PACKAGE_MANAGER_TO_TEST || '' }}
            -e RUN_APP_IMAGE_TEST=${{ matrix.test_config.env.RUN_APP_IMAGE_TEST || false }}
            -e VITEST_SMART_CACHE_FILE=./test/vitest-scripts/_vitest-smart-cache.json
            -e RESET_VITEST_SHARD_CACHE=${{ inputs.reset-vitest-smart-cache }}

      - name: Upload smart cache artifact
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.2
        if: always()
        with:
          name: vitest-smart-cache-e2e-${{ matrix.test_config.env.PACKAGE_MANAGER_TO_TEST }}
          path: ${{ github.workspace }}/test/vitest-scripts/_vitest-smart-cache.json
          retention-days: 1
          if-no-files-found: error

  # -------------------------
  # Merge Smart Cache Artifacts
  # -------------------------

  merge-smart-cache:
    needs: [test-linux, test-windows, test-macos, test-e2e, test-updater, test-snap]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/pnpm

      - name: Download all smart cache artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: vitest-smart-cache-*
          path: smart-cache-artifacts
        continue-on-error: true

      - name: Merge cache files
        run: |
          mkdir -p merged-cache

          # Create merge script
          cat > merge-caches.js << 'EOF'
          const fs = require('fs');
          const path = require('path');

          const artifactsDir = 'smart-cache-artifacts';
          const outputFile = 'merged-cache/_vitest-smart-cache.json';
          const repoCommittedCache = 'test/vitest-scripts/_vitest-smart-cache.json';

          let mergedCache = {};
          let filesProcessed = 0;

          // Start with repo-committed cache as base (if it exists)
          if (fs.existsSync(repoCommittedCache)) {
            console.log('Loading base cache from repo-committed file');
            try {
              mergedCache = JSON.parse(fs.readFileSync(repoCommittedCache, 'utf8'));
              console.log(`Base cache has ${Object.keys(mergedCache).length} entries`);
            } catch (err) {
              console.error('Error reading repo-committed cache:', err.message);
            }
          }

          // Check if artifacts directory exists
          if (!fs.existsSync(artifactsDir)) {
            console.log('No smart cache artifacts found to merge, using base cache only');
            fs.writeFileSync(outputFile, JSON.stringify(mergedCache, null, 2));
            process.exit(0);
          }

          // Read all cache files from test runs
          const platforms = fs.readdirSync(artifactsDir);

          platforms.forEach(platform => {
            const cacheFile = path.join(artifactsDir, platform, '_vitest-smart-cache.json');
            if (fs.existsSync(cacheFile)) {
              console.log(`Reading cache from ${platform}`);
              try {
                const cache = JSON.parse(fs.readFileSync(cacheFile, 'utf8'));
                filesProcessed++;

                // Deep-merge top-level objects so all shards' new timing data is preserved
                Object.keys(cache).forEach(key => {
                  if (mergedCache[key] && typeof mergedCache[key] === 'object' && !Array.isArray(mergedCache[key])) {
                    mergedCache[key] = { ...mergedCache[key], ...cache[key] };
                  } else {
                    mergedCache[key] = cache[key];
                  }
                });
              } catch (err) {
                console.error(`Error reading cache from ${platform}:`, err.message);
              }
            }
          });

          console.log(`Processed ${filesProcessed} cache files from test runs`);
          console.log(`Final merged cache has ${Object.keys(mergedCache).length} entries`);
          fs.writeFileSync(outputFile, JSON.stringify(mergedCache, null, 2));
          EOF

          node merge-caches.js

      - name: Delete individual cache artifacts
        uses: geekyeggo/delete-artifact@f275313e70c08f6120db482d7a6b98377786765b # v5.1.0
        with:
          name: vitest-smart-cache-*
          failOnError: false
        continue-on-error: true

      - name: Copy merged cache to canonical path
        if: always()
        run: cp merged-cache/_vitest-smart-cache.json test/vitest-scripts/_vitest-smart-cache.json

      - name: Compute Vitest smart cache ref
        if: always()
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          if [ -n "$PR_NUM" ]; then
            echo "VITEST_CACHE_REF=PR-${PR_NUM}" >> "$GITHUB_ENV"
          else
            echo "VITEST_CACHE_REF=${{ github.ref_name }}" >> "$GITHUB_ENV"
          fi

      - name: Upload vitest smart cache artifact
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.2
        if: always()
        with:
          name: vitest-smart-cache-${{ env.VITEST_CACHE_REF }}
          path: merged-cache/_vitest-smart-cache.json
          retention-days: 90
          overwrite: true

